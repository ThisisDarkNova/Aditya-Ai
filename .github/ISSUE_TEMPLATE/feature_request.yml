name: "🚀 Feature Request"
description: Propose a new feature or improvement for ADITYA OS.
title: "[FEATURE]: "
labels: ["enhancement", "feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make ADITYA OS better? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: E.g., I'm always frustrated when...
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: E.g., Add a dark mode toggle to the dashboard...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: E.g., Using external scripts to manage theme...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockup mock diagrams about the feature request here.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I confirm this feature is not already implemented or requested.
          required: true
