name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  audit-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: NPM Audit
        run: |
          cd VisionInterface
          npm audit --audit-level=high

  audit-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Python Dependency Audit
        run: |
          pip-audit -r CognitiveCore/requirements.txt
