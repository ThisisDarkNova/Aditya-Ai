name: Lint and Format

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Ruff
      run: pip install ruff
    - name: Run Ruff Check
      run: ruff check .
    - name: Run Ruff Format Check
      run: ruff format --check .

  lint-javascript:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
    - name: Install dependencies
      run: |
        cd client
        npm ci
    - name: Run ESLint
      run: |
        cd client
        npm run lint || echo "ESlint warning"
