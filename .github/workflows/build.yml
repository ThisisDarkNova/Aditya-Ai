name: Build and Release VESPERA OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r CognitiveCore/requirements.txt pyinstaller

    - name: Compile Backend (PyInstaller)
      run: |
        pyinstaller --onefile --noconsole --name VesperaCore --distpath CognitiveCore/dist --workpath CognitiveCore/build CognitiveCore/main.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node.js Dependencies
      working-directory: ./VisionInterface
      run: npm install

    - name: Generate Premium NSIS Assets
      working-directory: ./VisionInterface
      run: python create_installer_assets.py

    - name: Build and Package Electron App
      working-directory: ./VisionInterface
      run: npm run electron:dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VESPERA-Setup
        path: VisionInterface/release/VESPERA Setup *.exe
