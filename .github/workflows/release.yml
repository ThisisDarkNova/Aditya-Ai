name: Build and Release Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt pyinstaller

    - name: Compile Backend (PyInstaller)
      run: |
        pyinstaller --onefile --noconsole --name AdityaCore --distpath backend/dist --workpath backend/build backend/main.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node.js Dependencies
      working-directory: ./client
      run: npm install

    - name: Generate Premium NSIS Assets
      working-directory: ./client
      run: python create_installer_assets.py

    - name: Build and Package Electron App
      working-directory: ./client
      run: npm run electron:dist
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: client/release/ADITYA Setup *.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
