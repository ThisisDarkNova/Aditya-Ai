name: Ascension CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run Master Build Script
      shell: powershell
      run: |
        .\build_ascended.ps1

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Vespera-Ascension-Release
        path: Release/
