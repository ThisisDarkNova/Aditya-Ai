<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto" style="background:#171717; border-radius:16px;">
  <style>
    .bg { fill: #171717; }
    .box {
      fill: #1a1a1a;
      stroke: #10b981;
      stroke-width: 2;
      rx: 8px;
    }
    .box-glow {
      fill: none;
      stroke: #10b981;
      stroke-width: 4;
      rx: 8px;
      opacity: 0;
      animation: pulse-box 4s infinite ease-in-out;
    }
    .text-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      font-weight: 600;
      fill: #ffffff;
      text-anchor: middle;
    }
    .text-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      fill: #8a8a8a;
      text-anchor: middle;
    }
    .line {
      stroke: #059669;
      stroke-width: 2;
      stroke-dasharray: 6 6;
      fill: none;
      animation: flow-line 5s infinite linear;
    }
    .line-label-bg {
      fill: #171717;
    }
    .line-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 10px;
      fill: #34d399;
      text-anchor: middle;
    }
    @keyframes pulse-box {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.02); }
    }
    @keyframes flow-line {
      to { stroke-dashoffset: -60px; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <!-- Connections -->
  <!-- A to B (Spawns) -->
  <path d="M 400 100 L 600 100 L 600 150" class="line" />
  <rect x="460" y="90" width="80" height="20" class="line-label-bg" />
  <text x="500" y="104" class="line-label">1. Spawns</text>

  <!-- A to C (Renders) -->
  <path d="M 400 100 L 200 100 L 200 150" class="line" />
  <rect x="260" y="90" width="80" height="20" class="line-label-bg" />
  <text x="300" y="104" class="line-label">2. Renders</text>

  <!-- A to B (Polls status) -->
  <path d="M 400 120 L 500 120 L 500 170 L 600 170" class="line" />
  <rect x="460" y="110" width="80" height="20" class="line-label-bg" />
  <text x="500" y="124" class="line-label">3. Polls status</text>

  <!-- B to D (Connects) -->
  <path d="M 600 230 L 600 300 L 500 300 L 500 320" class="line" />
  <rect x="460" y="290" width="80" height="20" class="line-label-bg" />
  <text x="500" y="304" class="line-label">4. Connects</text>

  <!-- B to E (Controls) -->
  <path d="M 600 230 L 600 300 L 700 300 L 700 320" class="line" />
  <rect x="660" y="290" width="80" height="20" class="line-label-bg" />
  <text x="700" y="304" class="line-label">5. Controls</text>

  <!-- Nodes -->
  <!-- A: Electron Shell -->
  <g transform="translate(300, 40)">
    <rect x="0" y="0" width="200" height="60" class="box" />
    <rect x="0" y="0" width="200" height="60" class="box-glow" />
    <text x="100" y="26" class="text-title">ADITYA.exe</text>
    <text x="100" y="44" class="text-sub">Electron Shell</text>
  </g>

  <!-- C: React UI -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="200" height="60" class="box" />
    <rect x="0" y="0" width="200" height="60" class="box-glow" style="animation-delay: 1s;" />
    <text x="100" y="34" class="text-title">React Frontend UI</text>
  </g>

  <!-- B: Python Backend -->
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="200" height="80" class="box" />
    <rect x="0" y="0" width="200" height="80" class="box-glow" style="animation-delay: 0.5s;" />
    <text x="100" y="36" class="text-title">main.exe</text>
    <text x="100" y="54" class="text-sub">Python Backend</text>
  </g>

  <!-- D: Gemini API -->
  <g transform="translate(410, 320)">
    <rect x="0" y="0" width="180" height="60" class="box" />
    <rect x="0" y="0" width="180" height="60" class="box-glow" style="animation-delay: 2s;" />
    <text x="90" y="34" class="text-title">Gemini 3.1 Live API</text>
  </g>

  <!-- E: Native APIs -->
  <g transform="translate(610, 320)">
    <rect x="0" y="0" width="180" height="60" class="box" />
    <rect x="0" y="0" width="180" height="60" class="box-glow" style="animation-delay: 2.5s;" />
    <text x="90" y="26" class="text-title">Windows APIs</text>
    <text x="90" y="44" class="text-sub">&amp; Tesseract OCR</text>
  </g>
</svg>
