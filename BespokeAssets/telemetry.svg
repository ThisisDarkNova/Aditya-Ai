<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto" style="background:#171717; border-radius:16px;">
  <style>
    .bg { fill: #171717; }
    .node {
      fill: #10b981;
      filter: drop-shadow(0 0 8px #10b981);
      animation: pulse-node 4s infinite ease-in-out;
    }
    .node-delay-1 { animation-delay: 1s; }
    .node-delay-2 { animation-delay: 2s; }
    .node-delay-3 { animation-delay: 3s; }
    
    .connection {
      stroke: #059669;
      stroke-width: 1.5;
      stroke-dasharray: 8 8;
      stroke-dashoffset: 0;
      animation: flow-data 10s infinite linear;
      opacity: 0.6;
    }
    .connection-fast {
      stroke: #34d399;
      stroke-dasharray: 4 4;
      animation: flow-data 5s infinite linear;
      opacity: 0.8;
    }
    .label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      fill: #8a8a8a;
      letter-spacing: 1px;
    }
    
    @keyframes pulse-node {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.3); opacity: 1; filter: drop-shadow(0 0 15px #34d399); }
    }
    @keyframes flow-data {
      to { stroke-dashoffset: -80px; }
    }
  </style>
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Connections -->
  <line x1="150" y1="120" x2="300" y2="70" class="connection" />
  <line x1="150" y1="120" x2="300" y2="170" class="connection" />
  <line x1="300" y1="70" x2="450" y2="120" class="connection-fast" />
  <line x1="300" y1="170" x2="450" y2="120" class="connection" />
  <line x1="450" y1="120" x2="650" y2="120" class="connection-fast" />
  
  <!-- Nodes -->
  <g transform="translate(150, 120)">
    <circle cx="0" cy="0" r="10" class="node" />
  </g>
  <g transform="translate(300, 70)">
    <circle cx="0" cy="0" r="8" class="node node-delay-1" />
  </g>
  <g transform="translate(300, 170)">
    <circle cx="0" cy="0" r="8" class="node node-delay-2" />
  </g>
  <g transform="translate(450, 120)">
    <circle cx="0" cy="0" r="12" class="node node-delay-3" />
  </g>
  <g transform="translate(650, 120)">
    <circle cx="0" cy="0" r="10" class="node" />
  </g>
  
  <!-- Labels -->
  <text x="150" y="150" class="label" text-anchor="middle">Input Stream</text>
  <text x="300" y="45" class="label" text-anchor="middle">Voice Pipeline</text>
  <text x="300" y="205" class="label" text-anchor="middle">OCR Vision</text>
  <text x="450" y="155" class="label" text-anchor="middle">Gemini Core</text>
  <text x="650" y="150" class="label" text-anchor="middle">Response</text>
</svg>
