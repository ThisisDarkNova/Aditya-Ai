version: '3.8'

services:
  vespera-os:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7865:7865"
    volumes:
      - ./packages/umbracore/data:/app/packages/umbracore/data
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=development
    restart: unless-stopped
