<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VESPERA</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #171717;
      color: #ececec;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "SF Pro Rounded", "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    .orb-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }
    .orb-outer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.25) 0%, rgba(16, 185, 129, 0) 70%);
      opacity: 0.8;
      animation: pulse-outer 2.5s infinite ease-in-out;
    }
    .orb-mid {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.4) 0%, rgba(16, 185, 129, 0) 65%);
      animation: pulse-mid 2.5s infinite ease-in-out;
    }
    .orb-core {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.8), 0 0 50px rgba(16, 185, 129, 0.4);
      animation: pulse-core 2.5s infinite ease-in-out;
    }
    @keyframes pulse-outer {
      0%, 100% { transform: scale(0.85); opacity: 0.3; }
      50% { transform: scale(1.15); opacity: 0.9; }
    }
    @keyframes pulse-mid {
      0%, 100% { transform: scale(0.9); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 0.85; }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(0.92); box-shadow: 0 0 20px rgba(16, 185, 129, 0.7); }
      50% { transform: scale(1.08); box-shadow: 0 0 35px rgba(16, 185, 129, 1), 0 0 60px rgba(16, 185, 129, 0.6); }
    }
    .title {
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 6px;
      margin-bottom: 12px;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .status-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-text {
      font-size: 13px;
      color: #8a8a8a;
      letter-spacing: 1px;
    }
    .spinner {
      width: 12px;
      height: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="orb-container">
    <div class="orb-outer"></div>
    <div class="orb-mid"></div>
    <div class="orb-core"></div>
  </div>
  <div class="title">VESPERA</div>
  <div class="status-container">
    <div class="spinner"></div>
    <div class="status-text">Initializing cognitive engine...</div>
  </div>
</body>
</html>
