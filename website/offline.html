<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — ADITYA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .offline-container {
            max-width: 480px;
            padding: var(--space-xl);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <h1 class="gradient-text" style="font-size: 64px; margin-bottom: 20px;">Offline</h1>
        <h2 style="margin-bottom: var(--space-md);">No Connection</h2>
        <p style="color: var(--text-2); margin-bottom: var(--space-xl);">Please check your network settings. ADITYA's offline helper is ready once you are back online.</p>
        <button onclick="window.location.reload();" class="btn-primary">Retry Connection</button>
    </div>
</body>
</html>
