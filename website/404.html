<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .error-container {
            max-width: 480px;
            padding: var(--space-xl);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="gradient-text" style="font-size: 64px; margin-bottom: 20px;">404</h1>
        <h2 style="margin-bottom: var(--space-md);">Lost in the Orbit?</h2>
        <p style="color: var(--text-2); margin-bottom: var(--space-xl);">The page you are looking for does not exist or has been moved.</p>
        <a href="index.html" class="btn-primary">Return Home</a>
    </div>
</body>
</html>
